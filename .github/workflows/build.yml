name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-whisper-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            cmake_flags: "-DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON -DGGML_NATIVE=OFF"
          - os: macos-latest
            target: x86_64-apple-darwin
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON -DGGML_NATIVE=OFF"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cmake_flags: ""
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            cmake_flags: "-T ClangCL"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cmake_flags: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cmake_flags: "-DCMAKE_TOOLCHAIN_FILE=../aarch64-toolchain.cmake"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggerganov/whisper.cpp
          ref: v1.8.3
          path: whisper.cpp

      - name: Install aarch64 cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          cat > aarch64-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF

      - name: Build whisper-cli
        run: |
          cd whisper.cpp
          cmake -B build ${{ matrix.cmake_flags }} -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DGGML_CUDA=OFF -DGGML_VULKAN=OFF
          cmake --build build --config Release --target whisper-cli -j $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
        shell: bash

      - name: Verify static linking (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== otool -L ==="
          otool -L whisper.cpp/build/bin/whisper-cli
          if otool -L whisper.cpp/build/bin/whisper-cli | grep -q libwhisper; then
            echo "ERROR: whisper-cli is dynamically linked against libwhisper!"
            exit 1
          fi
          echo "Static linking verified."

      - name: Prepare binary
        run: |
          mkdir -p output
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp whisper.cpp/build/bin/Release/whisper-cli.exe output/whisper-cli-${{ matrix.target }}.exe
          else
            cp whisper.cpp/build/bin/whisper-cli output/whisper-cli-${{ matrix.target }}
            chmod +x output/whisper-cli-${{ matrix.target }}
          fi
          # Copy Metal shader library if present (macOS Metal builds)
          if [ -f whisper.cpp/build/bin/ggml-metal.metallib ]; then
            cp whisper.cpp/build/bin/ggml-metal.metallib output/
          fi
        shell: bash

      - name: Upload whisper-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: whisper-cli-${{ matrix.target }}
          path: output/
          retention-days: 1

  build:
    needs: build-whisper-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download whisper-cli binary
        uses: actions/download-artifact@v4
        with:
          name: whisper-cli-${{ matrix.target }}
          path: src-tauri/binaries/

      - name: Prepare sidecar binary
        run: |
          cd src-tauri/binaries
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x whisper-cli-${{ matrix.target }}
          fi
        shell: bash

      - name: Install Linux system dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxdo-dev \
            pkg-config

      - name: Install Linux system dependencies (aarch64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libwebkit2gtk-4.1-dev:arm64 \
            libgtk-3-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libasound2-dev:arm64 \
            libxdo-dev:arm64 \
            libssl-dev:arm64 \
            pkg-config
          # Mirror arm64 libs into the sysroot so Tauri bundler can find them
          sudo mkdir -p /usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu
          sudo cp -a /usr/lib/aarch64-linux-gnu/libayatana-appindicator3.so* /usr/aarch64-linux-gnu/usr/lib/aarch64-linux-gnu/ || true
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        if: runner.os != 'Windows'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies (bun)
        if: runner.os != 'Windows'
        run: bun install

      - name: Install frontend dependencies (npm)
        if: runner.os == 'Windows'
        run: npm install

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }} --config src-tauri/tauri.windows-ci.conf.json
          tauriScript: npx tauri

      - name: Build Tauri app (Linux)
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
        with:
          args: --target ${{ matrix.target }} --config src-tauri/tauri.linux-ci.conf.json
          tauriScript: bun tauri

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tauriScript: bun tauri

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calliope-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**
          retention-days: 7
